    <script>
      (function () {
        try {
          const storedTheme = localStorage.getItem("theme");
          const osPrefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;

          let initialTheme = "emerald";

          if (storedTheme) {
            initialTheme = storedTheme;
          } else if (osPrefersDark) {
            initialTheme = "night";
          }

          document.documentElement.setAttribute("data-theme", initialTheme);
        } catch (e) {
          console.log("Theme detection failed", e);
        }
      })();
    </script>

    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      :root {
        --bg-loading: #ffffff;
        --text-loading: #333333;
        --spinner-color: #10b981;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-loading: #0f1729;
          --text-loading: #cbd5e1;
          --spinner-color: #38bdf8;
        }
      }

      html[data-theme="emerald"] .loading-container {
        background-color: #ffffff !important;
        color: #333333 !important;
        --spinner-override: #66cc8a;
      }

      html[data-theme="light"] .loading-container {
        background-color: #ffffff !important;
        color: #1f2937 !important;
        --spinner-override: #570df8;
      }

      html[data-theme="corporate"] .loading-container {
        background-color: #ffffff !important;
        color: #1f2937 !important;
        --spinner-override: #4b6bfb;
      }

      html[data-theme="synthwave"] .loading-container {
        background-color: #0a002f !important;
        color: #f9f9f9 !important;
        --spinner-override: #e779c1;
      }

      html[data-theme="night"] .loading-container {
        background-color: #0f1729 !important;
        color: #cbd5e1 !important;
        --spinner-override: #38bdf8;
      }

      html[data-theme="dark"] .loading-container {
        background-color: #1d232a !important;
        color: #a6adbb !important;
        --spinner-override: #7480ff;
      }

      html[data-theme="business"] .loading-container {
        background-color: #212121 !important;
        color: #a6adbb !important;
        --spinner-override: #1c4f82;
      }

      html[data-theme="dim"] .loading-container {
        background-color: #2a303c !important;
        color: #a6adbb !important;
        --spinner-override: #9fe88d;
      }

      html[data-theme="black"] .loading-container {
        background-color: #000000 !important;
        color: #a6adbb !important;
        --spinner-override: #333333;
      }

      html[data-theme="abyss"] .loading-container {
        background-color: #050505 !important;
        color: #cbd5e1 !important;
        --spinner-override: #d926a9;
      }

      /* TEMA BARU */
      html[data-theme="nord"] .loading-container {
        background-color: #eceff4 !important;
        color: #2e3440 !important;
        --spinner-override: #5e81ac;
      }

      html[data-theme="bumblebee"] .loading-container {
        background-color: #ffffff !important;
        color: #291334 !important;
        --spinner-override: #e0a82e;
      }

      html[data-theme="caramellatte"] .loading-container {
        background-color: #f3e8dd !important;
        color: #3d261d !important;
        --spinner-override: #c28a50;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100vw;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg-loading);
        color: var(--text-loading);
        transition: background-color 0.4s ease;
      }

      .loading-spinner {
        height: 3.5rem;
        width: 3.5rem;
        border-radius: 50%;
        border: 4px solid rgba(150, 150, 150, 0.2);
        border-top-color: var(--spinner-override, var(--spinner-color));
        animation: spin 1s cubic-bezier(0.55, 0.085, 0.68, 0.53) infinite;
        margin-bottom: 1rem;
      }

      .loading-text {
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.8;
        animation: pulseText 2s ease-in-out infinite;
      }

      /* Utilitas buat Screen Reader (ARIA) */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes pulseText {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="loading-container" role="status" aria-live="polite">

        <p class="loading-text" aria-hidden="true">Menyiapkan Tampilan...</p>
        <span class="sr-only">Harap tunggu, portofolio sedang dimuat.</span>
